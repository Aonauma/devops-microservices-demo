name: Deploy to EKS

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types:
      - completed

env:
  AWS_REGION: ap-southeast-7
  CLUSTER_NAME: devops-microservice-demo

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      - name: Deploy manifests
        run: |
          kubectl apply -k deploy/kustomization/overlays/dev

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/api -n demo
          kubectl rollout restart deployment/web -n demo

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/api -n demo --timeout=180s
          kubectl rollout status deployment/web -n demo --timeout=180s