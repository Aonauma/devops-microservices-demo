apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels: { app-api }
spec:
  replicas: 1
  selector:
    matchLabels: { app-api }
  template:
    metadata:
      labels: { app-api }
    spec:
      containers:
        - name: api
          image: api
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NODE_ENV
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_VERSION
            - name: DUMMY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DUMMY_TOKEN
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /ready, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "300m", memory: "256Mi" }