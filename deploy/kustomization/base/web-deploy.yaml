apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels: { app-web }
spec:
  replicas: 1
  selector:
    matchLabels: { app-web }
  template:
    metadata:
      labels: { app-web }
    spec:
      containers:
        - name: web
          image: web
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "128Mi" }