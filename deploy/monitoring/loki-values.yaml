deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: filesystem

  rulerConfig:
    wal:
      dir: /var/loki/ruler-wal

singleBinary:
  replicas: 1
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi

  extraVolumes:
    - name: loki-tmp
      emptyDir: {}

  extraVolumeMounts:
    - name: loki-tmp
      mountPath: /var/loki

gateway:
  enabled: true

chunksCache:
  enabled: false

resultsCache:
  enabled: false

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

lokiCanary:
  enabled: false

test:
  enabled: false